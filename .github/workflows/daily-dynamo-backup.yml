name: Daily Dynamo Backup

on:
  schedule:
    # Runs daily at 01:30 UTC (07:00 IST)
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Dynamo backup
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DYNAMO_DATA_TABLE: ${{ secrets.DYNAMO_DATA_TABLE }}
          BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
          BACKUP_S3_PREFIX: ${{ secrets.BACKUP_S3_PREFIX }}
        run: npm run backup:dynamo

      - name: Send daily Excel reports
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DYNAMO_DATA_TABLE: ${{ secrets.DYNAMO_DATA_TABLE }}
          REPORT_SMTP_USER: ${{ secrets.REPORT_SMTP_USER }}
          REPORT_SMTP_PASS: ${{ secrets.REPORT_SMTP_PASS }}
          REPORT_MAIL_FROM: ${{ secrets.REPORT_MAIL_FROM }}
          REPORT_MAIL_TO: ${{ secrets.REPORT_MAIL_TO }}
          REPORT_MAIL_CC: ${{ secrets.REPORT_MAIL_CC }}
          REPORT_SKIP_IF_MISSING: "true"
        run: npm run report:daily-email

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: dynamo-daily-backup
          path: |
            scripts/backups/daily/*.json
            scripts/reports/daily/*.xlsx
          retention-days: 30
