name: Daily Dynamo Backup

on:
  schedule:
    # Runs daily at 01:30 UTC (07:00 IST)
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Dynamo backup
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          DYNAMO_DATA_TABLE: ${{ secrets.DYNAMO_DATA_TABLE }}
          BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
          BACKUP_S3_PREFIX: ${{ secrets.BACKUP_S3_PREFIX }}
        run: npm run backup:dynamo

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: dynamo-daily-backup
          path: scripts/backups/daily/*.json
          retention-days: 30
